name: Feature Request
description: Suggest a new feature or improvement for the Helm chart
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for improving the Stackweaver Helm chart? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to see. Include example values, templates, or configuration if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've considered or workarounds you're currently using.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, links, or references.
