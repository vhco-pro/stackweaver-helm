name: Release Helm Chart

on:
  workflow_dispatch: 
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u vhco-pro --password-stdin

      - name: Package chart
        run: |
          # Set chart version from git tag
          sed -i "s/^version:.*/version: ${{ github.ref_name }}/" chart/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ github.ref_name }}\"/" chart/Chart.yaml
          helm package chart/

      - name: Push to GHCR
        run: helm push stackweaver-${{ github.ref_name }}.tgz oci://ghcr.io/vhco-pro/charts

      - name: Update README version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sed -i "s|--version [0-9]\+\.[0-9]\+\.[0-9]\+|--version ${{ github.ref_name }}|g" README.md
          git add README.md
          git commit -m "chore: update README to ${{ github.ref_name }} [skip ci]" || echo "No changes to commit"
          git push origin HEAD:main || echo "Push failed"

      - name: Changelog & GitHub Release
        uses: michielvha/changelog-release-action@main
        with:
          version: ${{ github.ref_name }}
          type: helm
