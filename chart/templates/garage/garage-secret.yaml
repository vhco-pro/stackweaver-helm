{{- if .Values.garage.enabled }}
{{- $secretName := printf "%s-garage" (include "stackweaver.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $rpcSecret := "" }}
{{- $adminToken := "" }}
{{- $metricsToken := "" }}
{{- if $existing }}
{{- $rpcSecret = index $existing.data "rpc-secret" }}
{{- $adminToken = index $existing.data "admin-token" }}
{{- $metricsToken = index $existing.data "metrics-token" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: garage
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/hook: Skip
type: Opaque
data:
  {{- if $rpcSecret }}
  rpc-secret: {{ $rpcSecret }}
  {{- else }}
  rpc-secret: {{ printf "%s%s" (randAlphaNum 32 | sha256sum | trunc 32) (randAlphaNum 32 | sha256sum | trunc 32) | b64enc }}
  {{- end }}
  {{- if $adminToken }}
  admin-token: {{ $adminToken }}
  {{- else }}
  admin-token: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  {{- if $metricsToken }}
  metrics-token: {{ $metricsToken }}
  {{- else }}
  metrics-token: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
{{- end }}
