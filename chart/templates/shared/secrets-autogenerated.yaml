{{/* ── Auto-generated secrets (Helm-only path) ─────────────────────── */}}
{{/* These templates are SKIPPED by ArgoCD (hook: Skip). They exist      */}}
{{/* only for plain helm install/upgrade users. lookup() preserves       */}}
{{/* existing values so passwords are never regenerated on upgrade.      */}}
{{/*                                                                     */}}
{{/* WARNING: lookup() returns empty during helm template --dry-run or   */}}
{{/* if Helm lacks RBAC to read secrets. In that case the template falls */}}
{{/* through to randAlphaNum and generates NEW values — this is expected */}}
{{/* on first install but would break connections on upgrade if lookup() */}}
{{/* fails for RBAC reasons. Ensure Helm has secret read permissions.    */}}

{{/* ── Auto-generated PostgreSQL secret ─────────────────────────────── */}}
{{- if not .Values.secrets.postgresql.secretName }}
{{- $secretName := printf "%s-postgresql" (include "stackweaver.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $pgPassword := "" }}
{{- if $existing }}
{{- $pgPassword = index $existing.data .Values.secrets.postgresql.keys.password }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
  annotations:
    helm.sh/resource-policy: keep
    # hook: Skip tells ArgoCD to never apply this template — it is for plain
    # helm upgrade only. lookup() preserves existing values so passwords are
    # never regenerated. In ArgoCD, secrets-init-job (PreSync) is the sole
    # creation path, which keeps ArgoCD from ever touching live credentials.
    argocd.argoproj.io/hook: Skip
type: Opaque
data:
  {{- if $pgPassword }}
  {{ .Values.secrets.postgresql.keys.password }}: {{ $pgPassword }}
  {{- else }}
  {{ .Values.secrets.postgresql.keys.password }}: {{ randAlphaNum 24 | b64enc }}
  {{- end }}
---
{{- end }}

{{/* ── Auto-generated storage secret ──────────────────────────────────── */}}
{{- if and (not .Values.secrets.storage.secretName) (eq (.Values.storage.auth | default "credentials") "credentials") }}
{{- $secretName := printf "%s-storage" (include "stackweaver.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $accessKey := "" }}
{{- $secretKey := "" }}
{{- if $existing }}
{{- $accessKey = index $existing.data .Values.secrets.storage.keys.accessKey }}
{{- $secretKey = index $existing.data .Values.secrets.storage.keys.secretKey }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/hook: Skip
type: Opaque
data:
  {{- if $accessKey }}
  {{ .Values.secrets.storage.keys.accessKey }}: {{ $accessKey }}
  {{- else }}
  {{/* Garage requires key IDs in GK + 24 hex format */}}
  {{ .Values.secrets.storage.keys.accessKey }}: {{ printf "GK%s" (randAlphaNum 24 | sha256sum | trunc 24) | b64enc }}
  {{- end }}
  {{- if $secretKey }}
  {{ .Values.secrets.storage.keys.secretKey }}: {{ $secretKey }}
  {{- else }}
  {{/* Garage requires 64 hex char secret keys */}}
  {{ .Values.secrets.storage.keys.secretKey }}: {{ printf "%s%s" (randAlphaNum 32 | sha256sum | trunc 32) (randAlphaNum 32 | sha256sum | trunc 32) | b64enc }}
  {{- end }}
---
{{- end }}

{{/* ── Auto-generated encryption key ────────────────────────────────── */}}
{{- if not .Values.secrets.encryption.secretName }}
{{- $secretName := printf "%s-encryption" (include "stackweaver.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $encKey := "" }}
{{- if $existing }}
{{- $encKey = index $existing.data .Values.secrets.encryption.keys.key }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: encryption
  annotations:
    helm.sh/resource-policy: keep
    # hook: Skip tells ArgoCD to never apply this template — it is for plain
    # helm upgrade only. lookup() preserves existing values so passwords are
    # never regenerated. In ArgoCD, secrets-init-job (PreSync) is the sole
    # creation path, which keeps ArgoCD from ever touching live credentials.
    argocd.argoproj.io/hook: Skip
type: Opaque
data:
  {{- if $encKey }}
  {{ .Values.secrets.encryption.keys.key }}: {{ $encKey }}
  {{- else }}
  {{/* 32-byte hex string (64 hex chars) */}}
  {{ .Values.secrets.encryption.keys.key }}: {{ printf "%s%s" (randAlphaNum 32 | sha256sum | trunc 32) (randAlphaNum 32 | sha256sum | trunc 32) | b64enc }}
  {{- end }}
---
{{- end }}

{{/* ── Auto-generated Zitadel secret ────────────────────────────────── */}}
{{- if not .Values.secrets.zitadel.secretName }}
{{- $secretName := printf "%s-zitadel" (include "stackweaver.fullname" .) }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $zMasterkey := "" }}
{{- $zAdminPassword := "" }}
{{- if $existing }}
{{- $zMasterkey = index $existing.data .Values.secrets.zitadel.keys.masterkey }}
{{- $zAdminPassword = index $existing.data .Values.secrets.zitadel.keys.adminPassword }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel
  annotations:
    helm.sh/resource-policy: keep
    # hook: Skip tells ArgoCD to never apply this template — it is for plain
    # helm upgrade only. lookup() preserves existing values so passwords are
    # never regenerated. In ArgoCD, secrets-init-job (PreSync) is the sole
    # creation path, which keeps ArgoCD from ever touching live credentials.
    argocd.argoproj.io/hook: Skip
type: Opaque
data:
  {{- if $zMasterkey }}
  {{ .Values.secrets.zitadel.keys.masterkey }}: {{ $zMasterkey }}
  {{- else }}
  {{/* masterkey must be exactly 32 chars */}}
  {{ .Values.secrets.zitadel.keys.masterkey }}: {{ randAlphaNum 32 | b64enc }}
  {{- end }}
  {{- if $zAdminPassword }}
  {{ .Values.secrets.zitadel.keys.adminPassword }}: {{ $zAdminPassword }}
  {{- else }}
  {{ .Values.secrets.zitadel.keys.adminPassword }}: {{ printf "%s!1A" (randAlphaNum 16) | b64enc }}
  {{- end }}
  {{/* admin-username is deterministic from values — always reflects current config */}}
  {{ .Values.secrets.zitadel.keys.adminUsername }}: {{ .Values.zitadel.init.adminUsername | b64enc }}
  {{/* These keys are populated by zitadel-init — start empty */}}
  {{- if $existing }}
  {{ .Values.secrets.zitadel.keys.clientId }}: {{ index $existing.data .Values.secrets.zitadel.keys.clientId | default ("" | b64enc) }}
  {{ .Values.secrets.zitadel.keys.clientSecret }}: {{ index $existing.data .Values.secrets.zitadel.keys.clientSecret | default ("" | b64enc) }}
  {{ .Values.secrets.zitadel.keys.loginServiceUserToken }}: {{ index $existing.data .Values.secrets.zitadel.keys.loginServiceUserToken | default ("" | b64enc) }}
  {{ .Values.secrets.zitadel.keys.frontendClientId }}: {{ index $existing.data .Values.secrets.zitadel.keys.frontendClientId | default ("" | b64enc) }}
  {{ .Values.secrets.zitadel.keys.webhookIdpSyncKey }}: {{ index $existing.data .Values.secrets.zitadel.keys.webhookIdpSyncKey | default ("" | b64enc) }}
  {{ .Values.secrets.zitadel.keys.webhookComplementTokenKey }}: {{ index $existing.data .Values.secrets.zitadel.keys.webhookComplementTokenKey | default ("" | b64enc) }}
  {{- else }}
  {{ .Values.secrets.zitadel.keys.clientId }}: {{ "" | b64enc }}
  {{ .Values.secrets.zitadel.keys.clientSecret }}: {{ "" | b64enc }}
  {{ .Values.secrets.zitadel.keys.loginServiceUserToken }}: {{ "" | b64enc }}
  {{ .Values.secrets.zitadel.keys.frontendClientId }}: {{ "" | b64enc }}
  {{ .Values.secrets.zitadel.keys.webhookIdpSyncKey }}: {{ "" | b64enc }}
  {{ .Values.secrets.zitadel.keys.webhookComplementTokenKey }}: {{ "" | b64enc }}
  {{- end }}
{{- end }}
