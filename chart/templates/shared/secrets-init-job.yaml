{{/* ── Secrets init Job ─────────────────────────────────────────────────── */}}
{{/* Runs as an ArgoCD PreSync hook (and Helm pre-install/pre-upgrade hook).   */}}
{{/* Creates each auto-generated secret ONLY if it does not already exist.     */}}
{{/*                                                                            */}}
{{/* Uses the namespace default ServiceAccount — it always exists, eliminating */}}
{{/* any SA-creation race condition. The Role + RoleBinding carry NO delete    */}}
{{/* policy so they persist between syncs — the default SA always has the      */}}
{{/* required permissions before the Job (wave "0") starts.                    */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "stackweaver.fullname" . }}-secrets-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-init
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    # No delete policy — Role persists between syncs so there is never a window
    # where the default SA lacks permissions when the Job runs.
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "stackweaver.fullname" . }}-secrets-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-init
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    # No delete policy — RoleBinding persists between syncs.
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "stackweaver.fullname" . }}-secrets-init
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "stackweaver.fullname" . }}-secrets-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-init
  annotations:
    argocd.argoproj.io/hook: PreSync
    helm.sh/hook: pre-install
    helm.sh/hook-weight: "-10"
    # No delete policy on either ArgoCD or Helm:
    # - ArgoCD: a Succeeded Job that still exists is skipped on subsequent syncs.
    #   The Job only re-runs if it is manually deleted (i.e. after a cluster wipe).
    # - Helm: pre-install only (not pre-upgrade) so helm upgrade never touches it.
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        {{- include "stackweaver.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: secrets-init
    spec:
      {{- include "stackweaver.imagePullSecrets" . | nindent 6 }}
      restartPolicy: OnFailure
      serviceAccountName: default
      containers:
        - name: secrets-init
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              NS="{{ .Release.Namespace }}"

              # Generate N alphanumeric chars from /dev/urandom
              gen_alnum() { head -c 256 /dev/urandom | base64 | tr -dc 'A-Za-z0-9' | head -c "$1"; }
              # Generate N lowercase hex chars from /dev/urandom
              gen_hex() { head -c 256 /dev/urandom | od -A n -t x1 | tr -d ' \n' | head -c "$1"; }

              {{- if not .Values.secrets.postgresql.secretName }}
              SECRET="{{ include "stackweaver.secrets.postgresql" . }}"
              if ! kubectl get secret "$SECRET" -n "$NS" >/dev/null 2>&1; then
                echo "Creating $SECRET..."
                kubectl create secret generic "$SECRET" -n "$NS" \
                  --from-literal="{{ .Values.secrets.postgresql.keys.password }}"="$(gen_alnum 24)"
              else
                echo "$SECRET already exists, skipping."
              fi
              {{- end }}

              {{- if not .Values.secrets.minio.secretName }}
              SECRET="{{ include "stackweaver.secrets.minio" . }}"
              if ! kubectl get secret "$SECRET" -n "$NS" >/dev/null 2>&1; then
                echo "Creating $SECRET..."
                kubectl create secret generic "$SECRET" -n "$NS" \
                  --from-literal="{{ .Values.secrets.minio.keys.accessKey }}"="minioadmin" \
                  --from-literal="{{ .Values.secrets.minio.keys.secretKey }}"="$(gen_alnum 32)"
              else
                echo "$SECRET already exists, skipping."
              fi
              {{- end }}

              {{- if not .Values.secrets.encryption.secretName }}
              SECRET="{{ include "stackweaver.secrets.encryption" . }}"
              if ! kubectl get secret "$SECRET" -n "$NS" >/dev/null 2>&1; then
                echo "Creating $SECRET..."
                kubectl create secret generic "$SECRET" -n "$NS" \
                  --from-literal="{{ .Values.secrets.encryption.keys.key }}"="$(gen_hex 64)"
              else
                echo "$SECRET already exists, skipping."
              fi
              {{- end }}

              {{- if not .Values.secrets.zitadel.secretName }}
              SECRET="{{ include "stackweaver.secrets.zitadel" . }}"
              if ! kubectl get secret "$SECRET" -n "$NS" >/dev/null 2>&1; then
                echo "Creating $SECRET..."
                kubectl create secret generic "$SECRET" -n "$NS" \
                  --from-literal="{{ .Values.secrets.zitadel.keys.masterkey }}"="$(gen_alnum 32)" \
                  --from-literal="{{ .Values.secrets.zitadel.keys.adminPassword }}"="$(gen_alnum 16)!1A" \
                  --from-literal="{{ .Values.secrets.zitadel.keys.adminUsername }}"="{{ .Values.zitadel.init.adminUsername }}" \
                  --from-literal="{{ .Values.secrets.zitadel.keys.clientId }}"="" \
                  --from-literal="{{ .Values.secrets.zitadel.keys.clientSecret }}"="" \
                  --from-literal="{{ .Values.secrets.zitadel.keys.loginServiceUserToken }}"="" \
                  --from-literal="{{ .Values.secrets.zitadel.keys.frontendClientId }}"="" \
                  --from-literal="{{ .Values.secrets.zitadel.keys.webhookIdpSyncKey }}"="" \
                  --from-literal="{{ .Values.secrets.zitadel.keys.webhookComplementTokenKey }}"=""
              else
                echo "$SECRET already exists, skipping."
              fi
              {{- end }}

              echo "Secrets initialization complete."
