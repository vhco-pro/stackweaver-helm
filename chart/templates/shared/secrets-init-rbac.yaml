{{/* ── Secrets-init RBAC ──────────────────────────────────────────────── */}}
{{/* Plain resources (no hook annotations) — always present in the       */}}
{{/* namespace so the default ServiceAccount has permissions BEFORE any   */}}
{{/* PreSync hook Job runs. Putting RBAC in hooks caused a race where    */}}
{{/* the Job started before the API server's authorization cache          */}}
{{/* propagated the new permissions.                                      */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "stackweaver.fullname" . }}-secrets-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-init
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "stackweaver.fullname" . }}-secrets-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-init
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "stackweaver.fullname" . }}-secrets-init
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
