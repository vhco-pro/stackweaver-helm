{{/* ── Secrets-init RBAC ──────────────────────────────────────────────── */}}
{{/* PreSync hook at wave -5 — ArgoCD applies these and waits for them   */}}
{{/* to be healthy before proceeding to wave 0 where the Job runs.       */}}
{{/* Helm hook-weight -20 ensures these are applied before the Job (-10) */}}
{{/* on plain helm install/upgrade.                                      */}}
{{/*                                                                     */}}
{{/* Uses the namespace default ServiceAccount — it always exists,       */}}
{{/* eliminating any SA-creation race condition.                          */}}
{{/*                                                                     */}}
{{/* No delete policy — Role + RoleBinding persist between syncs so      */}}
{{/* permissions are always available even if a sync is interrupted.      */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "stackweaver.fullname" . }}-secrets-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-init
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-5"
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "stackweaver.fullname" . }}-secrets-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-init
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-5"
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "stackweaver.fullname" . }}-secrets-init
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
