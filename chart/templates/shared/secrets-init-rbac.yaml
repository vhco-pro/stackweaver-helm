{{/* ── Secrets-init RBAC ──────────────────────────────────────────────── */}}
{{/* ArgoCD-only PreSync hook at wave -5 — applied and healthy before     */}}
{{/* the secrets-init Job runs at wave 0.                                 */}}
{{/*                                                                     */}}
{{/* These are NOT Helm hooks (helm.sh/hook removed). For plain           */}}
{{/* helm install/upgrade, RBAC is applied as regular resources and the   */}}
{{/* secrets-init Job does not run — secrets-autogenerated.yaml handles   */}}
{{/* secret creation via lookup() instead.                                */}}
{{/*                                                                     */}}
{{/* Uses the namespace default ServiceAccount — it always exists,       */}}
{{/* eliminating any SA-creation race condition.                          */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "stackweaver.fullname" . }}-secrets-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-init
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-5"
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "stackweaver.fullname" . }}-secrets-init
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: secrets-init
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-5"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "stackweaver.fullname" . }}-secrets-init
subjects:
  - kind: ServiceAccount
    name: default
    namespace: {{ .Release.Namespace }}
