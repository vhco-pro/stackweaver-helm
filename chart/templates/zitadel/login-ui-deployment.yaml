{{- if .Values.zitadel.bundled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stackweaver.fullname" . }}-login-ui
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: login-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "stackweaver.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: login-ui
  template:
    metadata:
      labels:
        {{- include "stackweaver.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: login-ui
    spec:
      {{- include "stackweaver.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      initContainers:
        - name: wait-for-zitadel
          image: busybox:1.36
          securityContext:
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
          command:
            - sh
            - -c
            - |
              until wget -qO- http://{{ include "stackweaver.fullname" . }}-zitadel:8080/debug/ready >/dev/null 2>&1; do
                echo "Waiting for Zitadel at {{ include "stackweaver.fullname" . }}-zitadel:8080..."
                sleep 3
              done
              echo "Zitadel is ready."
      containers:
        - name: login-ui
          image: "{{ .Values.zitadel.loginUI.image.repository }}:{{ .Values.zitadel.loginUI.image.tag }}"
          securityContext:
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_BASE_PATH
              value: /ui/v2/login
            - name: ZITADEL_API_URL
              value: "http://{{ include "stackweaver.fullname" . }}-zitadel:8080"
            - name: ZITADEL_SERVICE_USER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "stackweaver.secrets.zitadel" . }}
                  key: {{ .Values.secrets.zitadel.keys.loginServiceUserToken }}
                  optional: true
            - name: EMAIL_VERIFICATION
              value: "false"
            # x-zitadel-instance-host: tells Zitadel which instance to serve (by ExternalDomain).
            # Docker Compose: network_mode: host means probes use localhost (trusted); no override needed.
            - name: CUSTOM_REQUEST_HEADERS
              value: "x-zitadel-instance-host:{{ .Values.zitadel.config.ExternalDomain | default .Values.ingress.hosts.auth }}"
          # TCP socket probes: just verify the Next.js server is listening.
          # httpGet probes on /ui/v2/login trigger SSR which calls Zitadel via gRPC;
          # if Zitadel is slow the SSR hangs and the probe times out.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: nextjs-cache
              mountPath: /app/.next
          resources:
            {{- toYaml .Values.zitadel.loginUI.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        - name: nextjs-cache
          emptyDir: {}
{{- end }}
