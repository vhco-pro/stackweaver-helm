{{- if and .Values.zitadel.bundled (not .Values.zitadel.pat.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "stackweaver.fullname" . }}-zitadel-pat
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel
spec:
  accessModes:
    - {{ .Values.zitadel.pat.accessMode | default "ReadWriteMany" }}
  resources:
    requests:
      storage: {{ .Values.zitadel.pat.size | default "1Mi" }}
  {{- if .Values.zitadel.pat.storageClass }}
  storageClassName: {{ .Values.zitadel.pat.storageClass | quote }}
  {{- end }}
{{- end }}
