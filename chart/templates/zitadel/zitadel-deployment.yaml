{{- if .Values.zitadel.bundled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "stackweaver.fullname" . }}-zitadel
  labels:
    {{- include "stackweaver.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "stackweaver.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: zitadel
  template:
    metadata:
      labels:
        {{- include "stackweaver.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: zitadel
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/zitadel/configmap-zitadel.yaml") . | sha256sum }}
    spec:
      {{- include "stackweaver.imagePullSecrets" . | nindent 6 }}
      serviceAccountName: {{ include "stackweaver.fullname" . }}-zitadel-init
      # Run as root (Zitadel needs to write PAT file)
      securityContext:
        runAsUser: 0
      initContainers:
        - name: wait-for-postgresql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "stackweaver.postgresql.host" . }} {{ include "stackweaver.postgresql.port" . }}; do
                echo "Waiting for PostgreSQL at {{ include "stackweaver.postgresql.host" . }}:{{ include "stackweaver.postgresql.port" . }}..."
                sleep 2
              done
              echo "PostgreSQL is reachable."
      containers:
        - name: zitadel
          image: "{{ .Values.zitadel.image.repository }}:{{ .Values.zitadel.image.tag }}"
          args:
            - start-from-init
            - --config
            - /etc/zitadel/defaults.yaml
            - --steps
            - /etc/zitadel/init-steps.yaml
            - --masterkey
            - $(ZITADEL_MASTERKEY)
            - --tlsMode
            - external
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: ZITADEL_MASTERKEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "stackweaver.secrets.zitadel" . }}
                  key: {{ .Values.secrets.zitadel.keys.masterkey }}
            # Override DB password placeholders from configmap
            - name: ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "stackweaver.secrets.postgresql" . }}
                  key: {{ .Values.secrets.postgresql.keys.password }}
            - name: ZITADEL_DATABASE_POSTGRES_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "stackweaver.secrets.postgresql" . }}
                  key: {{ .Values.secrets.postgresql.keys.password }}
            # Override the first instance admin password from init-steps
            - name: ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "stackweaver.secrets.zitadel" . }}
                  key: {{ .Values.secrets.zitadel.keys.adminPassword }}
            - name: ZITADEL_DATABASE_POSTGRES_HOST
              value: {{ include "stackweaver.postgresql.host" . | quote }}
            - name: ZITADEL_LOGIN_UI_BASE_URL
              value: {{ include "stackweaver.loginUI.baseURL" . | quote }}
            - name: ZITADEL_LOGIN_UI_ORIGIN
              value: {{ include "stackweaver.loginUI.origin" . | quote }}
          volumeMounts:
            - name: config
              mountPath: /etc/zitadel
              readOnly: true
            - name: pat
              mountPath: /pat
          livenessProbe:
            httpGet:
              path: /debug/healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /debug/ready
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.zitadel.resources | nindent 12 }}
        # ── zitadel-init sidecar ──
        # Waits for Zitadel to become ready, reads the admin PAT from the shared
        # emptyDir, provisions OIDC apps / service users via gRPC, patches the
        # K8s Secret with the resulting credentials, and restarts consumers.
        # After provisioning it idles so the pod stays Running.
        - name: zitadel-init
          image: "{{ .Values.zitadel.init.image.repository }}:{{ .Values.zitadel.init.image.tag }}"
          imagePullPolicy: {{ .Values.zitadel.init.image.pullPolicy }}
          env:
            - name: ZITADEL_ISSUER
              value: "{{ include "stackweaver.zitadel.issuer" . }}/ui/v2/login"
            # Use localhost since we're in the same pod as Zitadel
            - name: ZITADEL_INTERNAL_ADDR
              value: "localhost:8080"
            # ZITADEL_DOMAIN must match Zitadel's ExternalDomain so the gRPC
            # :authority header resolves to the correct instance.
            - name: ZITADEL_DOMAIN
              value: {{ .Values.ingress.hosts.auth | quote }}
            - name: PROJECT_ROOT
              value: /config
            - name: ZITADEL_ADMIN_USERNAME
              value: {{ .Values.zitadel.init.adminUsername | quote }}
            - name: ZITADEL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "stackweaver.secrets.zitadel" . }}
                  key: {{ .Values.secrets.zitadel.keys.adminPassword }}
            - name: ZITADEL_PAT_PATH
              value: /pat/admin.pat
            # Frontend redirect URIs
            - name: FRONTEND_REDIRECT_URI
              value: {{ include "stackweaver.frontend.redirectURI" . | quote }}
            - name: FRONTEND_POST_LOGOUT_URI
              value: {{ include "stackweaver.app.url" . | quote }}
            # Login V2 BaseURI
            - name: LOGIN_UI_BASE_URL
              value: {{ include "stackweaver.loginUI.baseURL" . | quote }}
            # ── Kubernetes secret writer ──
            - name: K8S_SECRET_NAME
              value: {{ include "stackweaver.secrets.zitadel" . }}
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: K8S_API_DEPLOYMENT
              value: {{ include "stackweaver.fullname" . }}-api
            - name: K8S_FRONTEND_DEPLOYMENT
              value: {{ include "stackweaver.fullname" . }}-frontend
            - name: K8S_LOGIN_UI_DEPLOYMENT
              value: {{ include "stackweaver.fullname" . }}-login-ui
            # Secret key name overrides
            - name: K8S_KEY_CLIENT_ID
              value: {{ .Values.secrets.zitadel.keys.clientId }}
            - name: K8S_KEY_CLIENT_SECRET
              value: {{ .Values.secrets.zitadel.keys.clientSecret }}
            - name: K8S_KEY_LOGIN_SERVICE_USER_TOKEN
              value: {{ .Values.secrets.zitadel.keys.loginServiceUserToken }}
            - name: K8S_KEY_FRONTEND_CLIENT_ID
              value: {{ .Values.secrets.zitadel.keys.frontendClientId }}
            - name: K8S_KEY_WEBHOOK_IDP_SYNC_KEY
              value: {{ .Values.secrets.zitadel.keys.webhookIdpSyncKey }}
            - name: K8S_KEY_WEBHOOK_COMPLEMENT_TOKEN_KEY
              value: {{ .Values.secrets.zitadel.keys.webhookComplementTokenKey }}
            # ── SSO / IdP configuration ──
            {{- if .Values.sso.azureAd.clientId }}
            - name: AZURE_AD_CLIENT_ID
              value: {{ .Values.sso.azureAd.clientId | quote }}
            {{- if .Values.sso.azureAd.tenantId }}
            - name: AZURE_AD_TENANT_ID
              value: {{ .Values.sso.azureAd.tenantId | quote }}
            {{- end }}
            {{- if .Values.sso.secretName }}
            - name: AZURE_AD_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sso.secretName }}
                  key: azure-ad-client-secret
            {{- end }}
            {{- end }}
            {{- if .Values.sso.oidcProvider.clientId }}
            - name: OIDC_IDP_CLIENT_ID
              value: {{ .Values.sso.oidcProvider.clientId | quote }}
            {{- if .Values.sso.oidcProvider.name }}
            - name: OIDC_IDP_NAME
              value: {{ .Values.sso.oidcProvider.name | quote }}
            {{- end }}
            {{- if .Values.sso.oidcProvider.issuer }}
            - name: OIDC_IDP_ISSUER
              value: {{ .Values.sso.oidcProvider.issuer | quote }}
            {{- end }}
            {{- if .Values.sso.secretName }}
            - name: OIDC_IDP_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sso.secretName }}
                  key: oidc-idp-client-secret
            {{- end }}
            {{- end }}
          ports:
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: pat
              mountPath: /pat
              readOnly: true
          {{- with .Values.zitadel.init.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "stackweaver.fullname" . }}-zitadel-config
        - name: pat
          emptyDir: {}
{{- end }}
